<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glean Incident Command OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
/* Glean Incident Command OS — Design System */

:root {
  /* Neutrals — warm, cool-leaning */
  --bg: oklch(0.985 0.003 80);
  --surface: #ffffff;
  --surface-2: oklch(0.975 0.004 80);
  --surface-3: oklch(0.965 0.005 80);
  --border: oklch(0.92 0.005 80);
  --border-strong: oklch(0.86 0.006 80);
  --ink: oklch(0.22 0.012 250);
  --ink-2: oklch(0.42 0.012 250);
  --ink-3: oklch(0.58 0.012 250);
  --ink-4: oklch(0.72 0.008 250);

  /* Semantic */
  --red: oklch(0.58 0.19 25);
  --red-soft: oklch(0.95 0.04 25);
  --red-border: oklch(0.86 0.09 25);
  --red-ink: oklch(0.42 0.16 25);

  --orange: oklch(0.72 0.16 55);
  --orange-soft: oklch(0.96 0.04 65);
  --orange-border: oklch(0.86 0.09 60);
  --orange-ink: oklch(0.50 0.14 50);

  --blue: oklch(0.58 0.14 245);
  --blue-soft: oklch(0.96 0.025 245);
  --blue-border: oklch(0.86 0.06 245);
  --blue-ink: oklch(0.42 0.13 245);

  --green: oklch(0.60 0.13 155);
  --green-soft: oklch(0.96 0.03 155);
  --green-border: oklch(0.84 0.07 155);
  --green-ink: oklch(0.42 0.11 155);

  --purple: oklch(0.55 0.14 295);
  --purple-soft: oklch(0.96 0.03 295);
  --purple-border: oklch(0.86 0.06 295);
  --purple-ink: oklch(0.40 0.13 295);

  --shadow-sm: 0 1px 2px rgba(15, 22, 41, 0.04), 0 1px 1px rgba(15, 22, 41, 0.03);
  --shadow-md: 0 4px 12px rgba(15, 22, 41, 0.06), 0 1px 2px rgba(15, 22, 41, 0.04);
  --shadow-lg: 0 12px 32px rgba(15, 22, 41, 0.08), 0 2px 6px rgba(15, 22, 41, 0.04);

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;

  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01";
}

button { font-family: inherit; cursor: pointer; }

.mono { font-family: var(--font-mono); font-feature-settings: "calt" 0; }

/* App shell */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.brand-mark {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, oklch(0.45 0.18 265), oklch(0.55 0.16 285));
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 13px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
}
.brand-product {
  color: var(--ink-3);
  font-weight: 500;
  font-size: 13px;
  border-left: 1px solid var(--border-strong);
  padding-left: 10px;
  margin-left: 2px;
}

.nav {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--surface-2);
  padding: 3px;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.nav button {
  border: 0;
  background: transparent;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--ink-2);
  border-radius: 6px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav button:hover { color: var(--ink); }
.nav button.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.nav .step-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-4);
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.nav button.active .step-num { color: var(--ink-2); background: var(--surface-3); }

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--ink-3);
  font-size: 12px;
}

.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 0 0 var(--red);
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 oklch(0.58 0.19 25 / 0.5); }
  70% { box-shadow: 0 0 0 8px oklch(0.58 0.19 25 / 0); }
  100% { box-shadow: 0 0 0 0 oklch(0.58 0.19 25 / 0); }
}

.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, oklch(0.7 0.1 30), oklch(0.6 0.12 50));
  color: white;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
}

/* Page */
.page {
  flex: 1;
  padding: 24px 32px 48px;
  max-width: 1440px;
  margin: 0 auto;
  width: 100%;
}

/* Common components */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.card-pad { padding: 20px; }

.kicker {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
}

h1, h2, h3, h4 { margin: 0; letter-spacing: -0.01em; color: var(--ink); }
h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
h2 { font-size: 18px; font-weight: 600; }
h3 { font-size: 15px; font-weight: 600; }
h4 { font-size: 13px; font-weight: 600; color: var(--ink-2); }

.muted { color: var(--ink-3); }
.dim { color: var(--ink-4); }

.divider { height: 1px; background: var(--border); border: 0; margin: 16px 0; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--ink);
  transition: all .15s ease;
}
.btn:hover { background: var(--surface-2); border-color: var(--ink-4); }
.btn-primary {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.btn-primary:hover { background: oklch(0.32 0.012 250); border-color: oklch(0.32 0.012 250); }
.btn-danger {
  background: var(--red);
  color: white;
  border-color: var(--red);
}
.btn-danger:hover { background: oklch(0.52 0.19 25); border-color: oklch(0.52 0.19 25); }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--surface-2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--ink-2);
}
.chip-red { background: var(--red-soft); border-color: var(--red-border); color: var(--red-ink); }
.chip-orange { background: var(--orange-soft); border-color: var(--orange-border); color: var(--orange-ink); }
.chip-blue { background: var(--blue-soft); border-color: var(--blue-border); color: var(--blue-ink); }
.chip-green { background: var(--green-soft); border-color: var(--green-border); color: var(--green-ink); }
.chip-purple { background: var(--purple-soft); border-color: var(--purple-border); color: var(--purple-ink); }

.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4); display: inline-block; }
.dot-red { background: var(--red); }
.dot-orange { background: var(--orange); }
.dot-blue { background: var(--blue); }
.dot-green { background: var(--green); }
.dot-purple { background: var(--purple); }

/* Status glyph */
.glyph {
  width: 16px; height: 16px;
  border-radius: 50%;
  display: inline-grid; place-items: center;
  flex-shrink: 0;
}
.glyph-done { background: var(--green-soft); color: var(--green-ink); border: 1px solid var(--green-border); }
.glyph-prog { background: var(--blue-soft); color: var(--blue-ink); border: 1px solid var(--blue-border); }
.glyph-queue { background: var(--surface-2); color: var(--ink-3); border: 1px solid var(--border); }
.glyph-fail { background: var(--red-soft); color: var(--red-ink); border: 1px solid var(--red-border); }

.spin { animation: spin 2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Severity banner */
.sev-banner {
  background: linear-gradient(180deg, oklch(0.97 0.04 25), oklch(0.99 0.015 25));
  border: 1px solid var(--red-border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  overflow: hidden;
}
.sev-banner::before {
  content: "";
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--red);
}
.sev-tag {
  background: var(--red);
  color: white;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  letter-spacing: 0.04em;
}

/* Stat cards */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
}
.stat-label { font-size: 11px; color: var(--ink-3); font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
.stat-value { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-top: 6px; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--ink-3); margin-top: 8px; }
.stat-icon {
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px;
  border-radius: 8px;
  display: grid; place-items: center;
}

/* Section heading */
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-head h3 + .muted { font-size: 12px; }

/* Misc */
.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; }
.gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; }
.flex-1 { flex: 1; }
.spacer { flex: 1; }

/* Confidence bar */
.conf {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--ink-2);
  font-family: var(--font-mono);
}
.conf-bar {
  width: 64px; height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  overflow: hidden;
}
.conf-bar > span { display: block; height: 100%; background: var(--red); }

/* Timeline */
.tl { position: relative; padding-left: 22px; }
.tl::before {
  content: "";
  position: absolute; left: 7px; top: 6px; bottom: 6px;
  width: 1px; background: var(--border-strong);
}
.tl-item { position: relative; padding-bottom: 14px; }
.tl-item::before {
  content: ""; position: absolute; left: -19px; top: 5px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--surface); border: 2px solid var(--ink-3);
}
.tl-item.red::before { border-color: var(--red); background: var(--red); }
.tl-item.orange::before { border-color: var(--orange); background: var(--orange); }
.tl-item.blue::before { border-color: var(--blue); background: var(--blue); }
.tl-item.green::before { border-color: var(--green); background: var(--green); }

.tl-time { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
.tl-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-top: 2px; }
.tl-meta { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

/* Citation */
.cite {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 1px 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-2);
}
.cite:hover { background: var(--surface-3); }

/* Quick action */
.action-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  transition: all .15s ease;
}
.action-row:hover { border-color: var(--ink-4); box-shadow: var(--shadow-sm); }
.action-rank {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--ink);
  color: white;
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}

/* Owner mini */
.owner-mini {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
}
.owner-mini:hover { background: var(--surface-2); }
.owner-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
  color: white;
  flex-shrink: 0;
}

/* Graph (Screen 2) */
.graph-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.graph-toolbar {
  height: 44px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  background: var(--surface-2);
}

.graph-canvas {
  position: relative;
  height: 640px;
  background-color: var(--surface);
  background-image:
    radial-gradient(circle at 1px 1px, oklch(0.92 0.005 80) 1px, transparent 0);
  background-size: 22px 22px;
  overflow: hidden;
}

.swimlane {
  position: absolute;
  top: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.swim-head {
  position: absolute;
  top: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  pointer-events: none;
}
.swim-head .kicker { font-size: 10px; }
.swim-count {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  color: var(--ink-3);
}

.gnode {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all .12s ease;
  min-width: 150px;
  max-width: 200px;
  z-index: 2;
}
.gnode:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
  border-color: var(--ink-4);
  z-index: 3;
}
.gnode.selected {
  border-color: var(--ink) !important;
  box-shadow: 0 0 0 3px oklch(0.22 0.012 250 / 0.1), var(--shadow-md);
  z-index: 4;
}
.gnode .gnode-icon {
  width: 22px; height: 22px;
  border-radius: 6px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.gnode .gnode-label {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gnode .gnode-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
  margin-top: 1px;
}

.gnode.red { border-color: var(--red-border); background: var(--red-soft); }
.gnode.red .gnode-icon { background: var(--red); color: white; }
.gnode.red .gnode-label { color: var(--red-ink); }

.gnode.orange { border-color: var(--orange-border); background: oklch(0.99 0.015 60); }
.gnode.orange .gnode-icon { background: var(--orange); color: white; }

.gnode.blue { border-color: var(--blue-border); }
.gnode.blue .gnode-icon { background: var(--blue); color: white; }

.gnode.green { border-color: var(--green-border); }
.gnode.green .gnode-icon { background: var(--green); color: white; }

.gnode.purple { border-color: var(--purple-border); }
.gnode.purple .gnode-icon { background: var(--purple); color: white; }

.gnode.gray .gnode-icon { background: var(--surface-3); color: var(--ink-2); border: 1px solid var(--border); }

.gnode-mini {
  min-width: 0;
  padding: 6px 8px;
  font-size: 11px;
}
.gnode-mini .gnode-icon { width: 18px; height: 18px; font-size: 10px; }

/* SVG edges */
.edges {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
.edge {
  fill: none;
  stroke: oklch(0.86 0.006 80);
  stroke-width: 1.5;
}
.edge.dim { stroke: oklch(0.93 0.005 80); }
.edge.hot { stroke: var(--red); stroke-width: 2; }
.edge.warn { stroke: var(--orange); stroke-width: 1.75; }

/* Detail panel */
.detail-panel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 360px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 5;
  box-shadow: -8px 0 24px rgba(15,22,41,0.04);
}
.detail-head {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px;
}
.detail-body section + section { margin-top: 18px; }
.detail-foot {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--surface-2);
}

.kv {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 6px 12px;
  font-size: 12px;
}
.kv dt { color: var(--ink-3); }
.kv dd { margin: 0; color: var(--ink); }

/* Blast radius (mini) */
.blast {
  position: relative;
  height: 220px;
  background:
    radial-gradient(circle at center, oklch(0.97 0.04 25 / 0.7) 0%, transparent 60%),
    var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}
.blast-ring {
  position: absolute;
  border: 1px dashed var(--red-border);
  border-radius: 50%;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.blast-svc {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 5px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow-sm);
  white-space: nowrap;
  transform: translate(-50%, -50%);
}
.blast-svc.core {
  background: var(--red);
  color: white;
  border-color: var(--red);
}
.blast-svc.affected { border-color: var(--orange-border); background: var(--orange-soft); color: var(--orange-ink); }

/* Workspace columns */
.ws-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 20px;
}
@media (max-width: 1100px) {
  .ws-grid { grid-template-columns: 1fr; }
}

/* Task row */
.task {
  display: flex;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
}
.task + .task { margin-top: 8px; }
.task-title { font-size: 13px; font-weight: 500; }
.task-meta { font-size: 11px; color: var(--ink-3); margin-top: 4px; font-family: var(--font-mono); }

.update-card {
  background: var(--surface-2);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 16px;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.55;
}

function Stat({ label, value, sub, color, icon }) {
  const bg = {
    orange: "var(--orange-soft)", blue: "var(--blue-soft)",
    red: "var(--red-soft)", purple: "var(--purple-soft)", green: "var(--green-soft)",
  }[color] || "var(--surface-2)";
  const ink = {
    orange: "var(--orange-ink)", blue: "var(--blue-ink)",
    red: "var(--red-ink)", purple: "var(--purple-ink)", green: "var(--green-ink)",
  }[color] || "var(--ink-2)";
  return (
    <div className="stat">
      <div className="stat-icon" style={{ background: bg, color: ink }}>{icon}</div>
      <div className="stat-label">{label}</div>
      <div className="stat-value">{value}</div>
      <div className="stat-sub">{sub}</div>

function ActionRow({ action, rank }) {
  const tone = action.tone === "danger" ? "btn-danger" : "btn";

    </div>
  );
}

function GraphScreen({ onOpenWorkspace }) {
  const [selectedId, setSelectedId] = React.useState("n-ch-4521");
  const [hoveredId, setHoveredId] = React.useState(null);
  const [filter, setFilter] = React.useState("all");

  const selected = NODES.find(n => n.id === selectedId);

  // Determine "active" set: selection + neighbors
  const activeIds = React.useMemo(() => {
    const target = hoveredId || selectedId;
    if (!target) return new Set();
    const set = new Set([target]);
    EDGES.forEach(e => { if (e.from === target) set.add(e.to); if (e.to === target) set.add(e.from); });
    return set;
  }, [hoveredId, selectedId]);

  return (
    <div className="page fade-in" style={{ paddingTop: 16 }}>
      {/* Header strip */}
      <div className="row gap-12" style={{ marginBottom: 12 }}>
        <span className="sev-tag">SEV-1</span>
        <h1 style={{ fontSize: 18 }}>{INCIDENT.title}</h1>
        <span className="mono muted" style={{ fontSize: 12 }}>{INCIDENT.id}</span>
        <span className="dim">·</span>
        <span className="row gap-6 muted" style={{ fontSize: 12 }}><span className="live-dot" /> {INCIDENT.durationMin} min ago</span>
        <span className="spacer" />
        <button className="btn btn-primary" onClick={onOpenWorkspace}>
          Coordinate response {Icon.arrow(12)}
        </button>
      </div>

      <div className="graph-wrap">
        {/* Toolbar */}
        <div className="graph-toolbar">
          <span className="row gap-8" style={{ color: "var(--ink-2)", fontWeight: 500, fontSize: 13 }}>
            {Icon.graph(13)} Incident Graph
          </span>
          <span className="dim">·</span>
          <span className="muted" style={{ fontSize: 12 }}>36 nodes · 41 relationships · assembled in 87s</span>
          <span className="spacer" />
          <div className="row gap-6">
            {[
              { id: "all", label: "All" },
              { id: "hot", label: "Critical path" },
              { id: "owners", label: "Owners only" },
            ].map(f => (
              <button
                key={f.id}
                className={`btn btn-sm ${filter === f.id ? "btn-primary" : ""}`}
                onClick={() => setFilter(f.id)}
                style={filter !== f.id ? { background: "transparent", borderColor: "transparent", color: "var(--ink-2)" } : {}}
              >
                {f.label}
              </button>
            ))}
          </div>
          <span className="dim">·</span>
          <div className="row gap-12 muted" style={{ fontSize: 11 }}>
            <span className="row gap-4"><span className="dot dot-red" /> Critical</span>
            <span className="row gap-4"><span className="dot dot-orange" /> Suspicious</span>
            <span className="row gap-4"><span className="dot dot-blue" /> Info</span>
            <span className="row gap-4"><span className="dot dot-purple" /> Historical</span>
          </div>
        </div>

        {/* Canvas */}
        <div className="graph-canvas" style={{ paddingRight: selected ? 360 : 0, transition: "padding .2s ease" }}>
          {/* Lane headers */}
          {LANES.map(l => (
            <div key={l.id} className="swim-head" style={{ left: l.x, transform: "translateX(-50%)" }}>
              <span className="kicker">{l.title}</span>
              <span className="swim-count">{l.count}</span>
            </div>
          ))}

          {/* Edges (SVG) */}
          <svg className="edges" width="100%" height="100%">
            <defs>
              <marker id="arrow-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10" fill="oklch(0.86 0.006 80)" />
              </marker>
              <marker id="arrow-hot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10" fill="oklch(0.58 0.19 25)" />
              </marker>
              <marker id="arrow-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10" fill="oklch(0.72 0.16 55)" />
              </marker>
            </defs>
            {EDGES.map((e, i) => {
              const a = NODES.find(n => n.id === e.from);
              const b = NODES.find(n => n.id === e.to);
              if (!a || !b) return null;
              // Origin is right-edge of source, target is left-edge
              const x1 = a.x + (a.size === "lg" ? 70 : a.mini ? 60 : 70);
              const y1 = a.y;
              const x2 = b.x - (b.mini ? 60 : 70);
              const y2 = b.y;
              const cx = (x1 + x2) / 2;
              const dActive = activeIds.size && (activeIds.has(e.from) && activeIds.has(e.to));
              const cls = `edge ${e.kind}${dActive ? "" : (activeIds.size ? " dim" : "")}`;
              const marker = e.kind === "hot" ? "url(#arrow-hot)" : e.kind === "warn" ? "url(#arrow-warn)" : "url(#arrow-dim)";
              return (
                <path
                  key={i}
                  className={cls}
                  d={`M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`}
                  markerEnd={marker}
                  opacity={activeIds.size && !dActive ? 0.25 : 1}
                />
              );
            })}
          </svg>

          {/* Nodes */}
          {NODES.map(n => (
            <GraphNode
              key={n.id}
              node={n}
              selected={selectedId === n.id}
              dimmed={activeIds.size && !activeIds.has(n.id)}
              onSelect={() => setSelectedId(n.id)}
              onHover={setHoveredId}
            />
          ))}

          {/* Detail panel */}
          {selected && (
            <DetailPanel node={selected} onClose={() => setSelectedId(null)} />
          )}
        </div>
      </div>
    </div>
  );
}

function GraphNode({ node, selected, dimmed, onSelect, onHover }) {
  const w = node.size === "lg" ? 140 : node.mini ? 120 : 140;
  return (
    <div
      className={`gnode ${node.color} ${node.mini ? "gnode-mini" : ""} ${selected ? "selected" : ""}`}
      style={{
        left: node.x - w / 2,
        top: node.y - (node.mini ? 16 : 22),
        width: w,
        opacity: dimmed ? 0.35 : 1,
        transition: "opacity .15s ease",
      }}
      onClick={onSelect}
      onMouseEnter={() => onHover(node.id)}
      onMouseLeave={() => onHover(null)}
    >
      <span className="gnode-icon">{Icon[node.icon] ? Icon[node.icon](node.mini ? 11 : 12) : null}</span>
      <div className="col" style={{ minWidth: 0, flex: 1 }}>
        <span className="gnode-label">{node.label}</span>
        {node.sub && <span className="gnode-sub">{node.sub}</span>}
      </div>
    </div>
  );
}

    "n-ch-4521": {
      lane: "Recent change · deploy", title: "Deploy #4521 — API Gateway", subtitle: "rate limiter update",
      confidence: 0.92,

        ["Root cause", "Rate limiter misconfigured"],
      ],
      evidence: [
        "Same service (API Gateway)",
        "Same error pattern (timeout cascade)",
        "Same fix worked: rollback restored service",
        "Postmortem flagged this exact regression class",
      ],
      citations: ["INC-2034 postmortem"],
      actions: [{ label: "Open postmortem", primary: true }, { label: "View timeline" }],
    },
    "n-h1": {
      lane: "Hypothesis · 1 of 3", title: "Deploy #4521 introduced rate limiting bug", subtitle: "Lead hypothesis",
      confidence: 0.92,
      evidence: [
        "Error spike at T+0s after deploy (exact correlation)",
        "INC-2034 had same root cause; same fix worked",
        "Slack thread shows owner working on rate limiter recently",
